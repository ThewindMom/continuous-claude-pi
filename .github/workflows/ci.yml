name: CI

on:
  push:
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install TypeScript
        run: npm install typescript @sinclair/typebox
      - name: Typecheck package
        run: npx tsc -p continuous-claude-pi/tsconfig.json --noEmit
